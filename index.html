<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#0a0a0f 0%,#1a1020 50%,#0d1520 100%);min-height:100vh;color:#e8d5a3;direction:rtl}
header{background:linear-gradient(180deg,rgba(180,130,30,.15) 0%,transparent 100%);border-bottom:1px solid rgba(180,130,30,.3);padding:20px 40px;display:flex;align-items:center;justify-content:space-between}

.sub{font-size:.85rem;color:#8a7a5a;margin-top:4px}
.mc{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 80px)}
.cp{background:rgba(10,8,20,.8);border-left:1px solid rgba(180,130,30,.2);padding:25px 18px;overflow-y:auto}
.st{font-size:.72rem;text-transform:uppercase;letter-spacing:3px;color:#d4a017;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid rgba(212,160,23,.2)}
.cg{margin-bottom:25px}
.og{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ob{background:rgba(255,255,255,.04);border:1px solid rgba(180,130,30,.2);border-radius:8px;padding:9px 7px;cursor:pointer;transition:all .2s;text-align:center;color:#c8b88a;font-size:.8rem}
.ob:hover{background:rgba(212,160,23,.1);border-color:rgba(212,160,23,.5);color:#e8d5a3}
.ob.active{background:rgba(212,160,23,.15);border-color:#d4a017;color:#ffd966;box-shadow:0 0 12px rgba(212,160,23,.2)}
.ic{font-size:1.3rem;display:block;margin-bottom:3px}
.clg{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.cb{width:42px;height:42px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s}
.cb:hover{transform:scale(1.1)}
.cb.active{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.4)}
.sc{margin-bottom:13px}
.sl{display:flex;justify-content:space-between;font-size:.78rem;color:#8a7a5a;margin-bottom:5px}
.sl span{color:#d4a017;font-weight:700}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(180,130,30,.2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#d4a017;cursor:pointer}
.ei{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(180,130,30,.2);border-radius:8px;padding:9px 12px;color:#e8d5a3;font-size:.88rem;outline:none;direction:rtl}
.ei:focus{border-color:#d4a017}
.pa{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:35px;background:radial-gradient(ellipse at center,rgba(212,160,23,.03) 0%,transparent 70%)}
.sn{text-align:center;font-size:1.7rem;color:#d4a017;text-shadow:0 0 20px rgba(212,160,23,.4);margin-bottom:6px;letter-spacing:3px}
.ss{display:flex;gap:25px;margin-top:18px;background:rgba(0,0,0,.3);padding:18px 35px;border-radius:12px;border:1px solid rgba(180,130,30,.15)}
.si{text-align:center}
.sv{font-size:1.5rem;font-weight:700;color:#ffd966}
.sl2{font-size:.68rem;color:#8a7a5a;margin-top:3px}
.sb{width:75px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:5px;overflow:hidden}
.sbf{height:100%;border-radius:2px;background:linear-gradient(90deg,#d4a017,#ffd966);transition:width .5s}
.savebtn{margin-top:25px;background:linear-gradient(135deg,#b8860b,#d4a017);color:#0a0a0f;border:none;padding:13px 45px;border-radius:30px;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(212,160,23,.3)}
.savebtn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,160,23,.5)}
.ed{font-size:.83rem;color:rgba(212,160,23,.6);text-align:center;font-style:italic;min-height:22px;margin-top:5px}
.mb{display:inline-block;background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);padding:3px 10px;border-radius:20px;font-size:.73rem;color:#d4a017;margin-bottom:7px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(212,160,23,.92);color:#0a0a0f;padding:11px 28px;border-radius:30px;font-weight:700;transition:transform .4s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:900px){.mc{grid-template-columns:1fr}.cp{border-left:none;border-top:1px solid rgba(180,130,30,.2);order:2}.ss{gap:15px;padding:14px 18px}}
</style>

</div>
</div>
<div class="cg">

<button class="ob active" onclick="setM('damascus')" id="m-damascus"><span class="ic">&#x1F30A;</span>&#x641;&#x648;&#x644;&#x627;&#x630; &#x62F;&#x645;&#x634;&#x642;&#x64A;</button>

<div class="si"><div class="sv" id="sm">40</div><div class="sl2">&#x627;&#x644;&#x633;&#x62D;&#x631;</div><div class="sb"><div class="sbf" id="bm" style="width:40%"></div></div></div>

<script>
var st={t:'arabic',m:'damascus',g:'ruby',l:75,w:5,sh:50};
var types={arabic:{n:'&#x627;&#x644;&#x633;&#x64A;&#x641; &#x627;&#x644;&#x639;&#x631;&#x628;&#x64A;',d:72,s:85,du:90,mg:40},shamshir:{n:'&#x627;&#x644;&#x634;&#x645;&#x634;&#x64A;&#x631;',d:80,s:92,du:75,mg:55},straight:{n:'&#x627;&#x644;&#x633;&#x64A;&#x641; &#x627;&#x644;&#x645;&#x633;&#x62A;&#x642;&#x64A;&#x645;',d:78,s:78,du:95,mg:30},broad:{n:'&#x627;&#x644;&#x633;&#x64A;&#x641; &#x627;&#x644;&#x639;&#x631;&#x64A;&#x636;',d:95,s:60,du:98,mg:20},yatagan:{n:'&#x627;&#x644;&#x64A;&#x627;&#x62A;&#x627;&#x63A;&#x627;&#x646;',d:85,s:88,du:80,mg:65},khanda:{n:'&#x627;&#x644;&#x62E;&#x627;&#x646;&#x636;&#x629;',d:90,s:70,du:88,mg:50}};
var mats={damascus:{n:'&#x641;&#x648;&#x644;&#x627;&#x630; &#x62F;&#x645;&#x634;&#x642;&#x64A;',i:'&#x2694;&#xFE0F;',c1:'#d0d0d8',c2:'#8090a0',p:true},gold:{n:'&#x630;&#x647;&#x628;&#x64A;',i:'&#x2728;',c1:'#ffd700',c2:'#c89000',p:false},obsidian:{n:'&#x623;&#x648;&#x628;&#x633;&#x64A;&#x62F;&#x64A;&#x627;&#x646;',i:'&#x1F5A4;',c1:'#3a3050',c2:'#0a0820',p:false},moonsilver:{n:'&#x641;&#x636;&#x629; &#x642;&#x645;&#x631;&#x64A;&#x629;',i:'&#x1F319;',c1:'#e8eeff',c2:'#8090cc',p:false}};
var gems={ruby:{c:'#cc2200',g:'#ff6644'},sapphire:{c:'#0033cc',g:'#4488ff'},emerald:{c:'#006633',g:'#44ff88'},amethyst:{c:'#660099',g:'#cc44ff'},topaz:{c:'#aa7700',g:'#ffcc00'}};
function setT(t){st.t=t;document.querySelectorAll('[id^="t-"]').forEach(function(b){b.classList.remove('active')});document.getElementById('t-'+t).classList.add('active');render();}
function setM(m){st.m=m;document.querySelectorAll('[id^="m-"]').forEach(function(b){b.classList.remove('active')});document.getElementById('m-'+m).classList.add('active');var ma=mats[m];document.getElementById('mbadge').textContent=ma.i+' '+ma.n;render();}
function setG(g){st.g=g;document.querySelectorAll('[id^="g-"]').forEach(function(b){b.classList.remove('active')});document.getElementById('g-'+g).classList.add('active');render();}
function setL(v){st.l=+v;document.getElementById('lv').textContent=v;render();}
function setW(v){st.w=+v;document.getElementById('wv').textContent=v;render();}
function setSh(v){st.sh=+v;document.getElementById('shv').textContent=v;render();}
function setEng(v){document.getElementById('engd').textContent=v?'"'+v+'"':'';}
function render(){var b=types[st.t];var wm=(st.w-5)*2;var lm=(st.l-75)*0.28;var d=Math.min(99,Math.max(10,Math.round(b.d+wm)));var s=Math.min(99,Math.max(10,Math.round(b.s-lm*0.4-wm*0.4)));var du=Math.min(99,Math.max(10,Math.round(b.du+wm*0.2)));var mg=b.mg;document.getElementById('sd').textContent=d;document.getElementById('ss2').textContent=s;document.getElementById('sdu').textContent=du;document.getElementById('sm').textContent=mg;document.getElementById('bd').style.width=d+'%';document.getElementById('bs').style.width=s+'%';document.getElementById('bdu').style.width=du+'%';document.getElementById('bm').style.width=mg+'%';document.getElementById('sname').textContent=b.n;drawSword();}
function drawSword(){var svg=document.getElementById('ssv');var ma=mats[st.m];var gm=gems[st.g];var cy=65;var bL=Math.round(st.l*2.7);var bW=Math.round(st.w*2.2);var tip=Math.round((100-st.sh)*0.4+7);var cv=st.t==='shamshir'?24:st.t==='yatagan'?-14:st.t==='arabic'?8:0;var gW=st.t==='broad'?48:33;var hL=78;var bS=22;var gX=bS+bL;var hE=gX+hL;var bp='';if(cv>0){bp='M '+bS+','+(cy-bW/3)+' Q '+(bS+bL/2)+','+(cy-bW/3-cv)+' '+(gX-tip)+','+(cy-1)+' L '+gX+','+cy+' Q '+(bS+bL/2)+','+(cy+bW/3-cv+7)+' '+bS+','+(cy+bW/3)+' Z';}else if(cv<0){var ac=Math.abs(cv);bp='M '+bS+','+(cy-bW/3)+' Q '+(bS+bL/2)+','+(cy-bW/3+ac)+' '+(gX-tip)+','+(cy-1)+' L '+gX+','+cy+' Q '+(bS+bL/2)+','+(cy+bW/3+ac)+' '+bS+','+(cy+bW/3)+' Z';}else{bp='M '+bS+','+(cy-bW/3)+' L '+(gX-tip)+','+(cy-1)+' L '+gX+','+cy+' L '+(gX-tip)+','+(cy+1)+' L '+bS+','+(cy+bW/3)+' Z';}
var pl=ma.p?'<line x1="'+(bS+22)+'" y1="'+(cy-3)+'" x2="'+(gX-tip-8)+'" y2="'+(cy-3)+'" stroke="rgba(60,80,100,.4)" stroke-width="1"/><line x1="'+(bS+22)+'" y1="'+(cy+3)+'" x2="'+(gX-tip-8)+'" y2="'+(cy+3)+'" stroke="rgba(60,80,100,.3)" stroke-width=".7"/>':'';
var wr='';for(var i=0;i<5;i++){wr+='<line x1="'+(gX+11+i*12)+'" y1="'+(cy-6)+'" x2="'+(gX+11+i*12)+'" y2="'+(cy+6)+'" stroke="rgba(180,130,20,.5)" stroke-width="2"/>';}
svg.innerHTML='<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+ma.c1+'"/><stop offset="50%" stop-color="'+ma.c2+'"/><stop offset="100%" stop-color="'+ma.c1+'"/></linearGradient><linearGradient id="hg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5a4015"/><stop offset="50%" stop-color="#9a6820"/><stop offset="100%" stop-color="#5a4015"/></linearGradient><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4a017"/><stop offset="50%" stop-color="#ffd700"/><stop offset="100%" stop-color="#b8860b"/></linearGradient><radialGradient id="gmg"><stop offset="0%" stop-color="'+gm.g+'"/><stop offset="100%" stop-color="'+gm.c+'"/></radialGradient><filter id="fl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="gfl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><path d="'+bp+'" fill="url(#bg)" filter="url(#fl)"/>'+pl+'<rect x="'+(gX-4)+'" y="'+(cy-gW)+'" width="10" height="'+(gW*2)+'" rx="4" fill="url(#gg)" filter="url(#fl)"/><ellipse cx="'+(gX+1)+'" cy="'+cy+'" rx="5.5" ry="5.5" fill="url(#gmg)" filter="url(#gfl)"/><ellipse cx="'+(gX-1)+'" cy="'+(cy-2)+'" rx="2" ry="2" fill="rgba(255,255,255,.6)"/><rect x="'+(gX+7)+'" y="'+(cy-6)+'" width="'+(hL-13)+'" height="12" rx="5" fill="url(#hg)"/>'+wr+'<circle cx="'+(hE-6)+'" cy="'+cy+'" r="10" fill="url(#gg)" filter="url(#fl)"/><circle cx="'+(hE-8)+'" cy="'+(cy-3)+'" r="3.5" fill="rgba(255,255,255,.3)"/>';}
function save(){var t=document.getElementById('toast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
render();
</script>
